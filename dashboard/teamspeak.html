<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamSpeak Server Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Commit+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a2e30;
            --bg-secondary: #0f3d40;
            --bg-elevated: #145252;
            --text-primary: #f0fdfa;
            --text-secondary: #99e0d9;
            --text-muted: #5eaba3;
            --accent: #f59e0b;
            --accent-dark: #b45309;
            --success: #34d399;
            --error: #f87171;
            --warning: #fb923c;
            --info: #60a5fa;
            --border: #1a5456;
            --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: "Commit Mono", ui-monospace, "SF Mono", Consolas, monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 2rem 1rem;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 {
            font-size: 2.25rem;
            margin-bottom: 2rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .info-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .server-address {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .address-box {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.75rem 1rem;
            font-family: var(--font-mono);
            font-size: 1rem;
            flex: 1;
            min-width: 200px;
            color: var(--success);
        }
        .copy-btn {
            background: var(--bg-secondary);
            border: 2px solid var(--success);
            box-shadow: 3px 3px 0 var(--success);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            position: relative;
            top: 0;
            transition: top 150ms ease, box-shadow 150ms ease;
        }
        .copy-btn:hover {
            top: 2px;
            box-shadow: 1px 1px 0 var(--success);
        }
        .copy-btn:active {
            top: 3px;
            box-shadow: 0 0 0 var(--success);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .stat-box {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem;
            text-align: center;
        }
        .stat-value {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--success);
            margin-bottom: 0.25rem;
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .section {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .section-title {
            font-size: 1.25rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
        }
        .refresh-btn {
            background: var(--bg-secondary);
            border: 2px solid var(--text-muted);
            box-shadow: 2px 2px 0 var(--text-muted);
            color: var(--text-primary);
            padding: 0.4rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            position: relative;
            top: 0;
            transition: top 150ms ease, box-shadow 150ms ease;
        }
        .refresh-btn:hover {
            top: 1px;
            box-shadow: 1px 1px 0 var(--text-muted);
        }
        .refresh-btn:active {
            top: 2px;
            box-shadow: 0 0 0 var(--text-muted);
        }
        .client-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .client-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .client-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .client-avatar {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--accent);
        }
        .client-name {
            font-size: 1rem;
            font-weight: 500;
        }
        .client-details {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.125rem;
        }
        .client-actions {
            display: flex;
            gap: 0.5rem;
        }
        .action-btn {
            background: var(--bg-elevated);
            color: var(--text-primary);
            padding: 0.4rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            border: 2px solid var(--text-muted);
            box-shadow: 2px 2px 0 var(--text-muted);
            position: relative;
            top: 0;
            transition: top 150ms ease, box-shadow 150ms ease;
        }
        .action-btn:hover {
            top: 1px;
            box-shadow: 1px 1px 0 var(--text-muted);
        }
        .action-btn:active {
            top: 2px;
            box-shadow: 0 0 0 var(--text-muted);
        }
        .action-btn.kick {
            border-color: var(--warning);
            box-shadow: 2px 2px 0 var(--warning);
        }
        .action-btn.kick:hover { box-shadow: 1px 1px 0 var(--warning); }
        .action-btn.kick:active { box-shadow: 0 0 0 var(--warning); }
        .action-btn.ban {
            border-color: var(--error);
            box-shadow: 2px 2px 0 var(--error);
        }
        .action-btn.ban:hover { box-shadow: 1px 1px 0 var(--error); }
        .action-btn.ban:active { box-shadow: 0 0 0 var(--error); }
        .no-clients {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
        .notification {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            display: none;
            z-index: 1000;
            font-size: 0.875rem;
            max-width: 300px;
        }
        .notification.success { border-left: 3px solid var(--success); }
        .notification.error { border-left: 3px solid var(--error); }
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--success);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        input[type="text"] {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.5rem 0.75rem;
            color: var(--text-primary);
            font-size: 0.875rem;
            width: 250px;
        }
        input[type="text"]:focus {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TeamSpeak Server Admin</h1>

        <div class="info-card">
            <h2 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 0.75rem;">Server Connection Info</h2>
            <p style="color: var(--text-secondary); margin-bottom: 0.5rem; font-size: 0.875rem;">Share this address with people to connect:</p>
            <div class="server-address">
                <div class="address-box" id="serverAddress">Loading...</div>
                <button class="copy-btn" onclick="copyAddress()">Copy Address</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-value" id="clientCount">-</div>
                <div class="stat-label">Clients Online</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="maxClients">32</div>
                <div class="stat-label">Max Slots</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="channelCount">-</div>
                <div class="stat-label">Channels</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="uptime">-</div>
                <div class="stat-label">Uptime (hours)</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">
                <span>Connected Clients</span>
                <button class="refresh-btn" onclick="loadData()">Refresh</button>
            </div>
            <div id="clientList" class="client-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 0.75rem; font-size: 0.875rem;">Loading clients...</p>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">
                <span>Channel Management</span>
                <button class="refresh-btn" onclick="loadChannels()">Refresh</button>
            </div>
            <div style="margin-bottom: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <input type="text" id="newChannelName" placeholder="New channel name...">
                <button class="copy-btn" onclick="createChannel()">Create Channel</button>
            </div>
            <div id="channelList" class="client-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 0.75rem; font-size: 0.875rem;">Loading channels...</p>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">
                <span>Ban List</span>
                <button class="refresh-btn" onclick="loadBans()">Refresh</button>
            </div>
            <div id="banList" class="client-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 0.75rem; font-size: 0.875rem;">Loading bans...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        let serverAddress = '';

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.style.display = 'block';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        function copyAddress() {
            // Try modern clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(serverAddress).then(() => {
                    showNotification('Server address copied to clipboard!', 'success');
                }).catch(() => {
                    fallbackCopy();
                });
            } else {
                fallbackCopy();
            }
        }

        function fallbackCopy() {
            const textArea = document.createElement('textarea');
            textArea.value = serverAddress;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showNotification('Server address copied: ' + serverAddress, 'success');
            } catch (err) {
                showNotification('Copy failed. Address: ' + serverAddress, 'error');
            }
            document.body.removeChild(textArea);
        }

        async function loadData() {
            try {
                const response = await fetch('/api/teamspeak/status');
                const data = await response.json();

                if (data.error) {
                    showNotification('Error: ' + data.error, 'error');
                    return;
                }

                // Update server address
                serverAddress = data.server_address;
                document.getElementById('serverAddress').textContent = serverAddress;

                // Update stats
                document.getElementById('clientCount').textContent = data.clients_online;
                document.getElementById('maxClients').textContent = data.max_clients;
                document.getElementById('channelCount').textContent = data.channels;
                document.getElementById('uptime').textContent = data.uptime_hours;

                // Update client list
                const clientList = document.getElementById('clientList');
                if (data.clients && data.clients.length > 0) {
                    clientList.innerHTML = data.clients.map(client => `
                        <div class="client-item">
                            <div class="client-info">
                                <div class="client-avatar">${client.client_nickname ? client.client_nickname.charAt(0).toUpperCase() : '?'}</div>
                                <div>
                                    <div class="client-name">${client.client_nickname || 'Unknown'}</div>
                                    <div class="client-details">
                                        Connected: ${formatTime(client.client_idle_time)} ago
                                    </div>
                                </div>
                            </div>
                            <div class="client-actions">
                                <button class="action-btn kick" onclick="kickClient(${client.clid}, '${client.client_nickname}')">Kick</button>
                                <button class="action-btn ban" onclick="banClient(${client.clid}, '${client.client_nickname}')">Ban</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    clientList.innerHTML = '<div class="no-clients">No clients connected</div>';
                }
            } catch (error) {
                showNotification('Failed to load server data: ' + error.message, 'error');
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            if (mins < 60) return `${mins}m`;
            const hours = Math.floor(mins / 60);
            return `${hours}h ${mins % 60}m`;
        }

        async function kickClient(clid, nickname) {
            if (!confirm(`Kick ${nickname} from the server?`)) return;

            showNotification('Kicking ' + nickname + '...', 'success');

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 25000);

                const response = await fetch('/api/teamspeak/kick', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clid: parseInt(clid) }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                const data = await response.json();

                if (data.success) {
                    showNotification(`${nickname} has been kicked`, 'success');
                    setTimeout(loadData, 1000);
                } else {
                    showNotification('Failed to kick: ' + (data.error || JSON.stringify(data)), 'error');
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    showNotification('Request timed out. Operation may still complete.', 'error');
                } else {
                    showNotification('Error: ' + error.message, 'error');
                }
            }
        }

        async function banClient(clid, nickname) {
            const reason = prompt(`Ban ${nickname}?\n\nEnter ban reason:`, 'Banned by admin');
            if (!reason) return;

            showNotification(`Banning ${nickname}...`, 'success');

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 25000);

                const response = await fetch('/api/teamspeak/ban', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clid, reason }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                const data = await response.json();

                if (data.success) {
                    showNotification(`${nickname} has been banned`, 'success');
                    setTimeout(loadData, 1000);
                } else {
                    showNotification('Failed to ban client: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    showNotification('Request timed out. Operation may still complete.', 'error');
                } else {
                    showNotification('Error: ' + error.message, 'error');
                }
            }
        }

        async function loadChannels() {
            try {
                const response = await fetch('/api/teamspeak/channels');
                const data = await response.json();

                const channelList = document.getElementById('channelList');
                if (data.channels && data.channels.length > 0) {
                    channelList.innerHTML = data.channels.map(channel => `
                        <div class="client-item">
                            <div class="client-info">
                                <div class="client-avatar">#</div>
                                <div>
                                    <div class="client-name">${channel.channel_name}</div>
                                    <div class="client-details">
                                        CID: ${channel.cid} | Clients: ${channel.total_clients || 0}
                                    </div>
                                </div>
                            </div>
                            <div class="client-actions">
                                <button class="action-btn" style="border-color: var(--info); box-shadow: 2px 2px 0 var(--info);" onclick="renameChannel(${channel.cid}, '${channel.channel_name}')">Rename</button>
                                <button class="action-btn ban" onclick="deleteChannel(${channel.cid}, '${channel.channel_name}')">Delete</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    channelList.innerHTML = '<div class="no-clients">No channels found</div>';
                }
            } catch (error) {
                showNotification('Failed to load channels: ' + error.message, 'error');
            }
        }

        async function createChannel() {
            const nameInput = document.getElementById('newChannelName');
            const name = nameInput.value.trim();

            if (!name) {
                showNotification('Please enter a channel name', 'error');
                return;
            }

            showNotification('Creating channel, please wait...', 'success');

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 25000); // 25 second timeout

                const response = await fetch('/api/teamspeak/channel/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                const data = await response.json();

                if (data.success) {
                    showNotification('Channel created successfully', 'success');
                    nameInput.value = '';
                    setTimeout(loadChannels, 500);
                } else {
                    showNotification('Failed to create channel: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    showNotification('Request timed out. Operation may still complete.', 'error');
                } else {
                    showNotification('Error: ' + error.message, 'error');
                }
            }
        }

        async function renameChannel(cid, currentName) {
            const newName = prompt(`Rename channel "${currentName}"\n\nEnter new name:`, currentName);
            if (!newName || newName === currentName) return;

            showNotification('Renaming channel, please wait...', 'success');

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 25000);

                const response = await fetch('/api/teamspeak/channel/rename', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cid, name: newName }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                const data = await response.json();

                if (data.success) {
                    showNotification('Channel renamed successfully', 'success');
                    setTimeout(loadChannels, 500);
                } else {
                    showNotification('Failed to rename channel: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    showNotification('Request timed out. Operation may still complete.', 'error');
                } else {
                    showNotification('Error: ' + error.message, 'error');
                }
            }
        }

        async function deleteChannel(cid, name) {
            if (!confirm(`Delete channel "${name}"?\n\nThis will remove the channel and move clients to default channel.`)) return;

            showNotification('Deleting channel, please wait...', 'success');

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 25000);

                const response = await fetch('/api/teamspeak/channel/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cid }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                const data = await response.json();

                if (data.success) {
                    showNotification('Channel deleted successfully', 'success');
                    setTimeout(loadChannels, 500);
                } else {
                    showNotification('Failed to delete channel: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    showNotification('Request timed out. Operation may still complete.', 'error');
                } else {
                    showNotification('Error: ' + error.message, 'error');
                }
            }
        }

        async function loadBans() {
            try {
                const response = await fetch('/api/teamspeak/bans');
                const data = await response.json();

                const banList = document.getElementById('banList');
                if (data.bans && data.bans.length > 0) {
                    banList.innerHTML = data.bans.map(ban => {
                        const created = new Date(parseInt(ban.created) * 1000).toLocaleString();
                        const duration = ban.duration == 0 ? 'Permanent' : `${Math.floor(ban.duration / 3600)}h`;
                        return `
                        <div class="client-item">
                            <div class="client-info">
                                <div class="client-avatar">🚫</div>
                                <div>
                                    <div class="client-name">${ban.ip || ban.name || 'Unknown'}</div>
                                    <div class="client-details">
                                        Reason: ${ban.reason || 'No reason'} | Created: ${created} | Duration: ${duration}
                                    </div>
                                </div>
                            </div>
                            <div class="client-actions">
                                <button class="action-btn kick" onclick="removeBan(${ban.banid})">Remove Ban</button>
                            </div>
                        </div>
                    `}).join('');
                } else {
                    banList.innerHTML = '<div class="no-clients">No active bans</div>';
                }
            } catch (error) {
                showNotification('Failed to load bans: ' + error.message, 'error');
            }
        }

        async function removeBan(banid) {
            if (!confirm('Remove this ban?')) return;

            try {
                const response = await fetch('/api/teamspeak/unban', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ banid })
                });
                const data = await response.json();

                if (data.success) {
                    showNotification('Ban removed successfully', 'success');
                    setTimeout(loadBans, 500);
                } else {
                    showNotification('Failed to remove ban: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                showNotification('Error: ' + error.message, 'error');
            }
        }

        // Load data on page load and refresh every 5 seconds
        loadData();
        loadChannels();
        loadBans();
        setInterval(loadData, 5000);
        setInterval(loadChannels, 10000);  // Refresh channels every 10 seconds
        setInterval(loadBans, 30000);  // Refresh bans every 30 seconds
    </script>
</body>
</html>
