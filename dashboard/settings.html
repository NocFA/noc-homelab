<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Settings - NOCNET</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Commit+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a2e30;
            --bg-secondary: #0f3d40;
            --bg-elevated: #145252;
            --text-primary: #f0fdfa;
            --text-secondary: #99e0d9;
            --text-muted: #5eaba3;
            --accent: #f59e0b;
            --accent-dark: #b45309;
            --success: #34d399;
            --error: #f87171;
            --border: #1a5456;
            --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: "Commit Mono", ui-monospace, "SF Mono", Consolas, monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            min-height: 100vh;
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .back-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: var(--bg-elevated);
            border-color: var(--text-secondary);
        }
        .header-title {
            font-family: var(--font-mono);
            font-size: 1.125rem;
            color: var(--success);
        }
        .header-right {
            display: flex;
            gap: 0.75rem;
        }
        .save-btn, .restart-btn {
            background: var(--accent);
            border: none;
            color: var(--bg-primary);
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .save-btn:hover, .restart-btn:hover {
            background: var(--accent-dark);
            transform: translateY(-1px);
        }
        .save-btn:disabled, .restart-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .restart-btn {
            background: var(--error);
        }
        .restart-btn:hover {
            background: #dc2626;
        }
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 1rem;
        }
        .machine-group {
            margin-bottom: 1.5rem;
        }
        .machine-label {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .service-item {
            padding: 0.75rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-mono);
            font-size: 0.875rem;
        }
        .service-item:hover {
            background: var(--bg-elevated);
            border-color: var(--success);
        }
        .service-item.active {
            background: var(--bg-elevated);
            border-color: var(--success);
            box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.2);
        }
        .add-service-btn {
            width: 100%;
            padding: 0.5rem;
            background: transparent;
            border: 1px dashed var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        .add-service-btn:hover {
            border-color: var(--success);
            color: var(--success);
        }
        .editor-panel {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        .editor-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.875rem;
        }
        .editor-form {
            max-width: 800px;
        }
        .form-section {
            margin-bottom: 2rem;
        }
        .form-section-title {
            font-family: var(--font-mono);
            font-size: 0.875rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .form-field {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.875rem;
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--success);
            box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.2);
        }
        .form-help {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        .form-error {
            font-size: 0.75rem;
            color: var(--error);
            margin-top: 0.25rem;
        }
        .log-paths-list {
            margin-top: 0.5rem;
        }
        .log-path-item {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .log-path-item input {
            flex: 1;
        }
        .remove-btn {
            background: var(--error);
            border: none;
            color: var(--text-primary);
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .add-log-btn {
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--text-muted);
            padding: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            width: 100%;
            margin-top: 0.5rem;
        }
        .add-log-btn:hover {
            border-color: var(--success);
            color: var(--success);
        }
        .delete-service-btn {
            background: var(--error);
            border: none;
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            margin-top: 2rem;
        }
        .delete-service-btn:hover {
            background: #dc2626;
        }
        .message {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 1rem 1.5rem;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        .message.success {
            background: var(--success);
            color: var(--bg-primary);
        }
        .message.error {
            background: var(--error);
            color: var(--text-primary);
        }
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <button class="back-btn" onclick="window.location.href='/'">← Back to Dashboard</button>
                <span class="header-title">Settings Editor</span>
            </div>
            <div class="header-right">
                <button class="save-btn" id="saveBtn" onclick="saveConfig()" disabled>Save Changes</button>
                <button class="restart-btn" id="restartBtn" onclick="restartDashboard()" disabled>Restart Dashboard</button>
            </div>
        </div>
        <div class="main-content">
            <div class="sidebar" id="sidebar">
                <!-- Service tree will be rendered here -->
            </div>
            <div class="editor-panel">
                <div class="editor-empty" id="emptyState">
                    Select a service to edit or add a new one
                </div>
                <div class="editor-form" id="editorForm" style="display: none;">
                    <!-- Form will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let config = null;
        let selectedMachine = null;
        let selectedService = null;
        let hasChanges = false;

        // Load configuration on page load
        async function loadConfig() {
            try {
                const response = await fetch('/api/settings/config');
                config = await response.json();
                renderServiceTree();
            } catch (error) {
                showMessage('Failed to load configuration', 'error');
                console.error(error);
            }
        }

        // Render service tree in sidebar
        function renderServiceTree() {
            const sidebar = document.getElementById('sidebar');
            let html = '';

            // Local services
            html += '<div class="machine-group">';
            html += '<div class="machine-label">noc-local (macOS)</div>';
            for (const [svcId, svc] of Object.entries(config.local_services)) {
                const active = selectedMachine === 'local' && selectedService === svcId ? 'active' : '';
                html += `<div class="service-item ${active}" onclick="selectService('local', '${svcId}')">${svc.name}</div>`;
            }
            html += '<button class="add-service-btn" onclick="addService(\'local\')">+ Add Service</button>';
            html += '</div>';

            // Remote machines
            for (const machine of config.machines) {
                html += '<div class="machine-group">';
                html += `<div class="machine-label">${machine.display_name || machine.id} (${machine.platform})</div>`;
                for (const [svcId, svc] of Object.entries(machine.services || {})) {
                    const active = selectedMachine === machine.id && selectedService === svcId ? 'active' : '';
                    html += `<div class="service-item ${active}" onclick="selectService('${machine.id}', '${svcId}')">${svc.name}</div>`;
                }
                html += `<button class="add-service-btn" onclick="addService('${machine.id}')">+ Add Service</button>`;
                html += '</div>';
            }

            sidebar.innerHTML = html;
        }

        // Select a service for editing
        function selectService(machine, serviceId) {
            selectedMachine = machine;
            selectedService = serviceId;
            renderEditor();
            renderServiceTree(); // Re-render to update active state
        }

        // Add a new service
        function addService(machine) {
            const newId = prompt('Enter service ID (lowercase, alphanumeric, hyphens only):');
            if (!newId) return;

            // Validate ID
            if (!/^[a-z0-9-]+$/.test(newId)) {
                showMessage('Invalid service ID. Use lowercase alphanumeric + hyphens only.', 'error');
                return;
            }

            if (machine === 'local') {
                if (config.local_services[newId]) {
                    showMessage('Service ID already exists', 'error');
                    return;
                }
                config.local_services[newId] = {
                    name: newId.charAt(0).toUpperCase() + newId.slice(1),
                    launchd: `com.noc.${newId}`,
                    port: null,
                    log_paths: []
                };
            } else {
                const machineObj = config.machines.find(m => m.id === machine);
                if (!machineObj.services) machineObj.services = {};
                if (machineObj.services[newId]) {
                    showMessage('Service ID already exists', 'error');
                    return;
                }
                machineObj.services[newId] = {
                    name: newId.charAt(0).toUpperCase() + newId.slice(1),
                    manager: 'scheduled-task',
                    port: null
                };
            }

            markChanged();
            selectService(machine, newId);
        }

        // Delete current service
        function deleteService() {
            if (!confirm(`Delete service "${selectedService}"? This cannot be undone.`)) return;

            if (selectedMachine === 'local') {
                delete config.local_services[selectedService];
            } else {
                const machineObj = config.machines.find(m => m.id === selectedMachine);
                delete machineObj.services[selectedService];
            }

            selectedMachine = null;
            selectedService = null;
            markChanged();
            renderServiceTree();
            renderEditor();
        }

        // Render editor for selected service
        function renderEditor() {
            const emptyState = document.getElementById('emptyState');
            const editorForm = document.getElementById('editorForm');

            if (!selectedMachine || !selectedService) {
                emptyState.style.display = 'flex';
                editorForm.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            editorForm.style.display = 'block';

            const service = selectedMachine === 'local'
                ? config.local_services[selectedService]
                : config.machines.find(m => m.id === selectedMachine).services[selectedService];

            let html = '';

            // Common fields
            html += '<div class="form-section">';
            html += '<div class="form-section-title">Basic Information</div>';

            html += '<div class="form-field">';
            html += '<label class="form-label">Service ID</label>';
            html += `<input type="text" class="form-input" value="${selectedService}" disabled>`;
            html += '<div class="form-help">Service identifier (cannot be changed after creation)</div>';
            html += '</div>';

            html += '<div class="form-field">';
            html += '<label class="form-label">Display Name</label>';
            html += `<input type="text" class="form-input" id="field-name" value="${service.name || ''}" onchange="updateField('name', this.value)">`;
            html += '</div>';

            html += '<div class="form-field">';
            html += '<label class="form-label">Port</label>';
            html += `<input type="number" class="form-input" id="field-port" value="${service.port || ''}" placeholder="null" onchange="updateField('port', this.value ? parseInt(this.value) : null)">`;
            html += '<div class="form-help">Leave empty for services without a port</div>';
            html += '</div>';

            if (service.description !== undefined) {
                html += '<div class="form-field">';
                html += '<label class="form-label">Description</label>';
                html += `<input type="text" class="form-input" id="field-description" value="${service.description || ''}" onchange="updateField('description', this.value)">`;
                html += '</div>';
            }

            html += '</div>';

            // Type-specific fields
            if (selectedMachine === 'local') {
                html += '<div class="form-section">';
                html += '<div class="form-section-title">Service Manager</div>';

                html += '<div class="form-field">';
                html += '<label class="form-label">Manager Type</label>';
                html += '<select class="form-select" id="field-launchd" onchange="updateField(\'launchd\', this.value)">';
                html += `<option value="${service.launchd}">${getManagerLabel(service.launchd)}</option>`;
                html += '</select>';
                html += '<div class="form-help">LaunchAgent ID, docker:container, pm2:process, or homebrew.mxcl.service</div>';
                html += '</div>';

                if (service.compose_dir) {
                    html += '<div class="form-field">';
                    html += '<label class="form-label">Docker Compose Directory</label>';
                    html += `<input type="text" class="form-input" id="field-compose_dir" value="${service.compose_dir || ''}" onchange="updateField('compose_dir', this.value)">`;
                    html += '</div>';
                }

                html += '<div class="form-field">';
                html += '<label class="form-label">Log Paths</label>';
                html += '<div class="log-paths-list" id="logPathsList">';
                (service.log_paths || []).forEach((path, idx) => {
                    html += '<div class="log-path-item">';
                    html += `<input type="text" class="form-input" value="${path}" onchange="updateLogPath(${idx}, this.value)">`;
                    html += `<button class="remove-btn" onclick="removeLogPath(${idx})">✕</button>`;
                    html += '</div>';
                });
                html += '</div>';
                html += '<button class="add-log-btn" onclick="addLogPath()">+ Add Log Path</button>';
                html += '<div class="form-help">Supports wildcards (e.g., ~/logs/*.log)</div>';
                html += '</div>';

                html += '</div>';
            } else {
                // Remote service fields
                html += '<div class="form-section">';
                html += '<div class="form-section-title">Windows Service Manager</div>';

                html += '<div class="form-field">';
                html += '<label class="form-label">Manager Type</label>';
                html += '<select class="form-select" id="field-manager" onchange="updateField(\'manager\', this.value); renderEditor();">';
                for (const type of config.manager_types) {
                    const selected = service.manager === type ? 'selected' : '';
                    html += `<option value="${type}" ${selected}>${type}</option>`;
                }
                html += '</select>';
                html += '</div>';

                if (service.manager === 'scheduled-task') {
                    html += '<div class="form-field">';
                    html += '<label class="form-label">Task Name</label>';
                    html += `<input type="text" class="form-input" id="field-task_name" value="${service.task_name || ''}" onchange="updateField('task_name', this.value)">`;
                    html += '<div class="form-help">Windows Scheduled Task name (e.g., Homelab-Service)</div>';
                    html += '</div>';
                }

                if (service.manager === 'windows-service') {
                    html += '<div class="form-field">';
                    html += '<label class="form-label">Service Name</label>';
                    html += `<input type="text" class="form-input" id="field-service_name" value="${service.service_name || ''}" onchange="updateField('service_name', this.value)">`;
                    html += '<div class="form-help">Windows Service name</div>';
                    html += '</div>';
                }

                html += '<div class="form-field">';
                html += '<label class="form-label">Process Name</label>';
                html += `<input type="text" class="form-input" id="field-process_name" value="${service.process_name || ''}" onchange="updateField('process_name', this.value)">`;
                html += '<div class="form-help">Process name for status checks (without .exe)</div>';
                html += '</div>';

                html += '</div>';
            }

            // Delete button
            html += '<button class="delete-service-btn" onclick="deleteService()">Delete Service</button>';

            editorForm.innerHTML = html;
        }

        function getManagerLabel(launchd) {
            if (launchd.startsWith('docker:')) return 'Docker: ' + launchd.replace('docker:', '');
            if (launchd.startsWith('pm2:')) return 'PM2: ' + launchd.replace('pm2:', '');
            if (launchd.startsWith('homebrew.')) return 'Homebrew: ' + launchd.replace('homebrew.mxcl.', '');
            if (launchd === 'tailscale') return 'System (Tailscale)';
            return 'LaunchAgent: ' + launchd;
        }

        // Update a field in the current service
        function updateField(field, value) {
            const service = selectedMachine === 'local'
                ? config.local_services[selectedService]
                : config.machines.find(m => m.id === selectedMachine).services[selectedService];

            service[field] = value;
            markChanged();
        }

        // Log path management
        function addLogPath() {
            const service = config.local_services[selectedService];
            if (!service.log_paths) service.log_paths = [];
            service.log_paths.push('');
            markChanged();
            renderEditor();
        }

        function updateLogPath(idx, value) {
            const service = config.local_services[selectedService];
            service.log_paths[idx] = value;
            markChanged();
        }

        function removeLogPath(idx) {
            const service = config.local_services[selectedService];
            service.log_paths.splice(idx, 1);
            markChanged();
            renderEditor();
        }

        // Mark configuration as changed
        function markChanged() {
            hasChanges = true;
            document.getElementById('saveBtn').disabled = false;
        }

        // Save configuration
        async function saveConfig() {
            try {
                // Save local services
                const localRes = await fetch('/api/settings/save/local', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({services: config.local_services})
                });
                const localData = await localRes.json();

                if (!localData.success) {
                    showMessage('Error saving local services: ' + localData.error, 'error');
                    return;
                }

                // Save remote machines
                const remoteRes = await fetch('/api/settings/save/remote', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({machines: config.machines})
                });
                const remoteData = await remoteRes.json();

                if (!remoteData.success) {
                    showMessage('Error saving remote machines: ' + remoteData.error, 'error');
                    return;
                }

                showMessage('Configuration saved successfully', 'success');
                hasChanges = false;
                document.getElementById('saveBtn').disabled = true;
                document.getElementById('restartBtn').disabled = false;
            } catch (error) {
                showMessage('Failed to save configuration', 'error');
                console.error(error);
            }
        }

        // Restart dashboard
        async function restartDashboard() {
            if (!confirm('Restart the dashboard? The page will reload in ~5 seconds.')) return;

            try {
                await fetch('/api/settings/restart-dashboard', {method: 'POST'});
                showMessage('Restarting dashboard...', 'success');

                // Poll for availability and reload
                setTimeout(() => pollAndReload(), 5000);
            } catch (error) {
                showMessage('Failed to restart dashboard', 'error');
                console.error(error);
            }
        }

        function pollAndReload() {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch('/api/status', {timeout: 2000});
                    if (res.ok) {
                        clearInterval(interval);
                        window.location.href = '/';
                    }
                } catch (e) {
                    // Still restarting
                }
            }, 1000);

            // Timeout after 30s
            setTimeout(() => {
                clearInterval(interval);
                showMessage('Dashboard restart timed out. Please refresh manually.', 'error');
            }, 30000);
        }

        // Show message notification
        function showMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            document.body.appendChild(msg);

            setTimeout(() => msg.remove(), 5000);
        }

        // Initialize
        loadConfig();
    </script>
</body>
</html>
