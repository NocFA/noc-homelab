<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Dashboard</title>
    <style>
        body {
            background: #0d1117;
            color: #f0f6fc;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #ffffff; text-align: center; margin-bottom: 40px; }
        .services { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .service-group { 
            background: #1c2128; 
            border-radius: 8px; 
            padding: 20px; 
            box-shadow: rgba(0, 0, 0, 0.6) 0 4px 6px;
        }
        .service-group h2 { 
            color: #f39c12; 
            margin-top: 0; 
            border-bottom: 2px solid #f39c12;
            padding-bottom: 10px;
        }
        .service {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #30363d;
        }
        .service:last-child { border-bottom: none; }
        .service a {
            color: #f39c12;
            text-decoration: none;
            font-weight: 500;
        }
        .service a:hover { color: #f1c40f; }
        .status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 10px;
        }
        .online { background-color: #28a745; }
        .offline { background-color: #dc3545; }
        .checking { background-color: #ffc107; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NOC Dashboard</h1>
        
        <div class="services">
            <div class="service-group">
                <h2>Media Services</h2>
                <div class="service">
                    <a href="http://noc-local:8096" target="_blank">Emby Media Server</a>
                    <span class="status online" id="emby-status"></span>
                </div>
                <div class="service">
                    <a href="http://localhost:6789" target="_blank">NZBGet</a>
                    <span class="status checking" id="nzbget-status"></span>
                </div>
                <div class="service">
                    <a href="http://localhost:5076" target="_blank">NZBHydra2</a>
                    <span class="status checking" id="nzbhydra-status"></span>
                </div>
            </div>
            
            <div class="service-group">
                <h2>File & Network</h2>
                <div class="service">
                    <a href="http://localhost:8081" target="_blank">copyparty File Server</a>
                    <span class="status checking" id="copyparty-status"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple status checking
        function checkService(url, statusId) {
            fetch(url, {mode: 'no-cors'})
                .then(() => {
                    document.getElementById(statusId).className = 'status online';
                })
                .catch(() => {
                    document.getElementById(statusId).className = 'status offline';
                });
        }

        // Check services every 30 seconds
        function checkAllServices() {
            checkService('http://localhost:6789', 'nzbget-status');
            checkService('http://localhost:5076', 'nzbhydra-status');
            checkService('http://localhost:8081', 'copyparty-status');
            checkService('http://noc-local:8096', 'emby-status');
        }

        checkAllServices();
        setInterval(checkAllServices, 30000);
    </script>
</body>
</html>
