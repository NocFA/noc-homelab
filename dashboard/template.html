<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC-LOCAL Service Dashboard v3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #000;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a0033, #000, #1a0033);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            z-index: 0;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
            z-index: 1;
        }
        
        .orb1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #b026ff, transparent);
            top: -200px;
            left: -200px;
            animation-duration: 25s;
        }
        
        .orb2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #6366f1, transparent);
            bottom: -150px;
            right: -150px;
            animation-duration: 30s;
            animation-delay: -10s;
        }
        
        .orb3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #ec4899, transparent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 35s;
            animation-delay: -5s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(100px, -100px) scale(1.1); }
            50% { transform: translate(-100px, 100px) scale(0.9); }
            75% { transform: translate(50px, 50px) scale(1.05); }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 3rem;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, #b8b8b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        
        .service-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 24px;
            padding: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                inset 0 -1px 0 rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(20px);
            animation: cardFadeIn 0.6s ease-out forwards;
            cursor: pointer;
        }
        
        @keyframes cardFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .service-card:nth-child(1) { animation-delay: 0.1s; }
        .service-card:nth-child(2) { animation-delay: 0.2s; }
        .service-card:nth-child(3) { animation-delay: 0.3s; }
        .service-card:nth-child(4) { animation-delay: 0.4s; }
        .service-card:nth-child(5) { animation-delay: 0.5s; }
        .service-card:nth-child(6) { animation-delay: 0.6s; }
        .service-card:nth-child(7) { animation-delay: 0.7s; }
        
        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.3), 
                transparent);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        
        .service-card:hover::before {
            animation: shimmerLine 0.8s ease-out;
        }
        
        @keyframes shimmerLine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .service-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 20px 60px rgba(138, 43, 226, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        
        .button-group {
            display: flex;
            gap: 0.4rem;
            margin-top: 1rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.5rem 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            color: white;
            text-decoration: none;
            text-align: center;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.05), 
                rgba(255, 255, 255, 0.02));
            transition: all 0.2s ease;
        }
        
        .btn:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.1), 
                rgba(255, 255, 255, 0.05));
        }
        
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .service-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
        }
        
        .service-name {
            font-size: 1.4rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: -0.01em;
        }
        
        .status-badge {
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .status-online {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.3));
            color: #10f981;
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
            animation: pulse-online 2s ease-in-out infinite;
        }
        
        @keyframes pulse-online {
            0%, 100% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
            50% { box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); }
        }
        
        .status-offline {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.3));
            color: #ff4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .status-pending {
            background: linear-gradient(135deg, rgba(251, 146, 60, 0.2), rgba(251, 146, 60, 0.3));
            color: #fb923c;
            border: 1px solid rgba(251, 146, 60, 0.3);
            animation: pulse-pending 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse-pending {
            0%, 100% { box-shadow: 0 0 20px rgba(251, 146, 60, 0.2); }
            50% { box-shadow: 0 0 30px rgba(251, 146, 60, 0.4); }
        }
        
        .service-description {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
        }
        
        .service-port {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            font-family: 'SF Mono', monospace;
        }
        
        .click-hint {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 1rem;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }
        
        .service-card:hover .click-hint {
            opacity: 1;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .button-group {
            display: flex;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.7rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            color: white;
            text-decoration: none;
            text-align: center;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.05), 
                rgba(255, 255, 255, 0.02));
            transform: translateZ(0);
            will-change: transform;
            -webkit-transform: translateZ(0);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.2s ease,
                        background 0.2s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px) translateZ(0);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.3);
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.1), 
                rgba(255, 255, 255, 0.05));
        }
        
        .btn:active {
            transform: translateY(0) translateZ(0);
        }
        
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .btn-start { border-color: rgba(16, 185, 129, 0.3); }
        .btn-stop { border-color: rgba(239, 68, 68, 0.3); }
        .btn-restart { border-color: rgba(59, 130, 246, 0.3); }
        .btn-logs { border-color: rgba(99, 102, 241, 0.3); }
        .btn-visit { border-color: rgba(139, 92, 246, 0.3); }
        
        #notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            font-size: 0.9rem;
            font-weight: 500;
            max-width: 300px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        
        .notification-success {
            border-left: 3px solid #30d158;
        }
        
        .notification-error {
            border-left: 3px solid #ff453a;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        #logsModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 800px;
            max-height: 80vh;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            overflow: auto;
            animation: modalSlide 0.3s ease-out;
        }
        
        @keyframes modalSlide {
            from {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
        }
        
        .modal-close {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }
        
        .logs-content {
            background: rgba(0, 0, 0, 0.6);
            color: #00ff00;
            padding: 1.5rem;
            border-radius: 16px;
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(0, 255, 0, 0.1);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        
        .logs-content::-webkit-scrollbar {
            width: 8px;
        }
        
        .logs-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }
        
        .logs-content::-webkit-scrollbar-thumb {
            background: rgba(138, 43, 226, 0.5);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    
    <div class="container">
        <h1>NOC-LOCAL Service Dashboard</h1>
        <div class="services-grid" id="servicesGrid">
            {% for service in services %}
            <div class="service-card" data-service="{{ service.name }}" data-url="{{ service.url }}" onclick="visitService(this)">
                <div class="service-header">
                    <div class="service-name">{{ service.name }}</div>
                    <div class="status-badge status-{{ service.status }}" data-status="{{ service.status }}">
                        {{ service.status | upper }}
                    </div>
                </div>
                {% if service.description %}
                <div class="service-description">{{ service.description }}</div>
                {% endif %}
                <div class="service-port">Port: {{ service.port }}</div>
                <div class="button-group">
                    <button class="btn btn-start" onclick="event.stopPropagation(); controlService('{{ service.name }}', 'start')" 
                            {% if service.status == 'online' %}disabled{% endif %}>Start</button>
                    <button class="btn btn-stop" onclick="event.stopPropagation(); controlService('{{ service.name }}', 'stop')"
                            {% if service.status == 'offline' %}disabled{% endif %}>Stop</button>
                    <button class="btn btn-restart" onclick="event.stopPropagation(); controlService('{{ service.name }}', 'restart')">Restart</button>
                </div>
                <div class="button-group">
                    <button class="btn btn-logs" onclick="event.stopPropagation(); showLogs('{{ service.name }}')">View Logs</button>
                </div>
                
                <div class="click-hint">Click card to visit service</div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div id="notification"></div>
    
    <div id="logsModal" onclick="if(event.target === this) closeLogs()">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Service Logs</div>
                <button class="modal-close" onclick="closeLogs()">&times;</button>
            </div>
            <div class="logs-content" id="logsContent">Loading logs...</div>
        </div>
    </div>

    <script>
        let refreshTimer = null;
        
        console.log('Dashboard loaded at:', new Date().toISOString());
        console.log('Version: v3 - AJAX only updates, no DOM refresh');
        
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification-' + type;
            notification.style.display = 'block';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
        
        function visitService(cardElement) {
            const url = cardElement.dataset.url;
            const serviceName = cardElement.dataset.service;
            
            if (url) {
                window.open(url, '_blank');
                showNotification(`Opening ${serviceName}`, 'success');
            }
        }

        function controlService(name, action) {
            // Immediately show pending state
            const card = document.querySelector(`[data-service="${name}"]`);
            if (card) {
                const badge = card.querySelector('.status-badge');
                badge.className = 'status-badge status-pending';
                badge.textContent = 'PENDING';
                badge.dataset.status = 'pending';
                
                // Disable all buttons during operation
                const buttons = card.querySelectorAll('.btn');
                buttons.forEach(btn => {
                    if (!btn.classList.contains('btn-logs') && !btn.classList.contains('btn-visit')) {
                        btn.disabled = true;
                    }
                });
            }
            
            fetch(`/api/service/${action}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({service: name})
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showNotification(`${name} ${action} successful`, "success");
                    // Just a few reasonable checks instead of aggressive polling
                    setTimeout(() => refreshStatus(), 500);
                    setTimeout(() => refreshStatus(), 1500);
                    setTimeout(() => refreshStatus(), 3000);
                } else {
                    showNotification(data.message || "Operation failed", "error");
                    setTimeout(() => refreshStatus(), 200);
                }
            })
            .catch(error => {
                showNotification("Operation failed: " + error.message, "error");
                setTimeout(() => refreshStatus(), 200);
            });
        }

        function showLogs(name) {
            pauseAutoRefresh();
            const modal = document.getElementById('logsModal');
            const title = document.getElementById('modalTitle');
            const content = document.getElementById('logsContent');
            
            title.textContent = `${name} Logs`;
            content.textContent = 'Loading logs...';
            modal.style.display = 'block';
            
            fetch(`/api/service/logs`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({service: name})
            })
            .then(response => response.json())
            .then(data => {
                content.textContent = data.logs || 'No logs available';
            })
            .catch(error => {
                content.textContent = 'Error loading logs: ' + error.message;
            });
        }

        function closeLogs() {
            document.getElementById('logsModal').style.display = 'none';
            resumeAutoRefresh();
        }
        
        async function refreshStatus() {
            console.log('Refreshing status via AJAX at:', new Date().toISOString());
            
            try {
                // Add cache busting to force fresh data
                const timestamp = Date.now();
                const response = await fetch(`/api/status?t=${timestamp}&bust=${Math.random()}`, {
                    method: 'GET',
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const statusData = await response.json();
                
                console.log('Raw status response:', JSON.stringify(statusData, null, 2));
                
                // Convert backend format to what we need
                // Backend returns: {"emby": true, "copyparty": false}
                // We need to map this to our service cards
                
                Object.keys(statusData).forEach(serviceKey => {
                    const isOnline = statusData[serviceKey];
                    const status = isOnline ? 'online' : 'offline';
                    
                    // Find the card by looking for the service name
                    // Map backend keys to display names
                    const serviceNameMap = {
                        'emby': 'Emby',
                        'copyparty': 'Copyparty', 
                        'nzbhydra2': 'NZBHydra2',
                        'nzbget': 'NZBGet',
                        'maloja': 'Maloja',
                        'multi-scrobbler': 'Multi-Scrobbler',
                        'uptime-kuma': 'Uptime Kuma'
                    };
                    
                    const serviceName = serviceNameMap[serviceKey];
                    if (serviceName) {
                        const card = document.querySelector(`[data-service="${serviceName}"]`);
                        if (card) {
                            const badge = card.querySelector('.status-badge');
                            const currentStatus = badge.dataset.status;
                            
                            console.log(`${serviceName}: UI shows "${currentStatus}" -> API says "${status}"`);
                            
                            // Always update - force the change
                            badge.className = `status-badge status-${status}`;
                            badge.textContent = status.toUpperCase();
                            badge.dataset.status = status;
                            
                            // Update buttons based on actual status
                            const startBtn = card.querySelector('.btn-start');
                            const stopBtn = card.querySelector('.btn-stop');
                            const restartBtn = card.querySelector('.btn-restart');
                            
                            if (status === 'online') {
                                startBtn.disabled = true;
                                stopBtn.disabled = false;
                                restartBtn.disabled = false;
                            } else if (status === 'offline') {
                                startBtn.disabled = false;
                                stopBtn.disabled = true;
                                restartBtn.disabled = false;
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Failed to refresh status:', error);
            }
        }
        
        // Auto-refresh every 3 seconds using AJAX
        function startAutoRefresh() {
            refreshTimer = setInterval(() => {
                refreshStatus();
            }, 3000);
        }
        
        function pauseAutoRefresh() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
                refreshTimer = null;
            }
        }
        
        function resumeAutoRefresh() {
            if (!refreshTimer) {
                startAutoRefresh();
            }
        }
        
        // Initial auto-refresh setup
        startAutoRefresh();
        
        // Add keyboard shortcut to close modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLogs();
            }
        });
    </script>
</body>
</html>
