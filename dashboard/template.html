<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC-LOCAL Service Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0033, #000, #1a0033);
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 3rem;
            font-size: 3.5rem;
            font-weight: 700;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .service-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border-radius: 24px;
            padding: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
        }
        .service-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .service-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
        }
        .service-name {
            font-size: 1.4rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
        }
        .status-badge {
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-online {
            background: rgba(16, 185, 129, 0.25);
            color: #10f981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .status-offline {
            background: rgba(239, 68, 68, 0.25);
            color: #ff4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .status-pending {
            background: rgba(251, 146, 60, 0.25);
            color: #fb923c;
            border: 1px solid rgba(251, 146, 60, 0.3);
        }
        .service-description {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
        }
        .service-port {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            font-family: 'SF Mono', monospace;
        }
        .click-hint {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 1rem;
        }
        .button-group {
            display: flex;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        .btn {
            flex: 1;
            padding: 0.7rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            color: white;
            text-decoration: none;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            transition: background 0.2s, border-color 0.2s;
        }
        .btn:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
        .btn-start { border-color: rgba(16, 185, 129, 0.3); }
        .btn-stop { border-color: rgba(239, 68, 68, 0.3); }
        .btn-restart { border-color: rgba(59, 130, 246, 0.3); }
        .btn-logs { border-color: rgba(99, 102, 241, 0.3); }
        #notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            display: none;
            z-index: 1000;
            font-size: 0.9rem;
            font-weight: 500;
            max-width: 300px;
        }
        .notification-success { border-left: 3px solid #30d158; }
        .notification-error { border-left: 3px solid #ff453a; }
        #logsModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
        }
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 800px;
            max-height: 80vh;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            overflow: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .modal-title { font-size: 1.5rem; font-weight: 600; color: white; }
        .modal-close {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover { background: rgba(255, 255, 255, 0.2); }
        .logs-content {
            background: rgba(0, 0, 0, 0.6);
            color: #00ff00;
            padding: 1.5rem;
            border-radius: 16px;
            font-family: 'SF Mono', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(0, 255, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NOC-LOCAL Service Dashboard</h1>
        <div class="services-grid" id="servicesGrid">
            {% for service in services %}
            <div class="service-card" data-service="{{ service.name }}" data-url="{{ service.url }}" onclick="visitService(this)">
                <div class="service-header">
                    <div class="service-name">{{ service.name }}</div>
                    <div class="status-badge status-{{ service.status }}" data-status="{{ service.status }}">
                        {{ service.status | upper }}
                    </div>
                </div>
                {% if service.description %}
                <div class="service-description">{{ service.description }}</div>
                {% endif %}
                <div class="service-port">Port: {{ service.port }}</div>
                <div class="button-group">
                    <button class="btn btn-start" onclick="event.stopPropagation(); controlService('{{ service.name }}', 'start')"
                            {% if service.status == 'online' %}disabled{% endif %}>Start</button>
                    <button class="btn btn-stop" onclick="event.stopPropagation(); controlService('{{ service.name }}', 'stop')"
                            {% if service.status == 'offline' %}disabled{% endif %}>Stop</button>
                    <button class="btn btn-restart" onclick="event.stopPropagation(); controlService('{{ service.name }}', 'restart')">Restart</button>
                </div>
                <div class="button-group">
                    <button class="btn btn-logs" onclick="event.stopPropagation(); showLogs('{{ service.name }}')">View Logs</button>
                </div>
                <div class="click-hint">Click card to visit service</div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div id="notification"></div>

    <div id="logsModal" onclick="if(event.target === this) closeLogs()">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Service Logs</div>
                <button class="modal-close" onclick="closeLogs()">&times;</button>
            </div>
            <div class="logs-content" id="logsContent">Loading logs...</div>
        </div>
    </div>

    <script>
        let refreshTimer = null;

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification-' + type;
            notification.style.display = 'block';
            setTimeout(() => notification.style.display = 'none', 3000);
        }

        function visitService(cardElement) {
            const url = cardElement.dataset.url;
            const serviceName = cardElement.dataset.service;
            if (url) {
                window.open(url, '_blank');
                showNotification(`Opening ${serviceName}`, 'success');
            }
        }

        function controlService(name, action) {
            const card = document.querySelector(`[data-service="${name}"]`);
            if (card) {
                const badge = card.querySelector('.status-badge');
                badge.className = 'status-badge status-pending';
                badge.textContent = 'PENDING';
                badge.dataset.status = 'pending';
                card.querySelectorAll('.btn').forEach(btn => {
                    if (!btn.classList.contains('btn-logs')) btn.disabled = true;
                });
            }

            fetch(`/api/service/${action}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({service: name})
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showNotification(`${name} ${action} successful`, "success");
                    setTimeout(() => refreshStatus(), 500);
                    setTimeout(() => refreshStatus(), 1500);
                    setTimeout(() => refreshStatus(), 3000);
                } else {
                    showNotification(data.message || "Operation failed", "error");
                    setTimeout(() => refreshStatus(), 200);
                }
            })
            .catch(error => {
                showNotification("Operation failed: " + error.message, "error");
                setTimeout(() => refreshStatus(), 200);
            });
        }

        function showLogs(name) {
            pauseAutoRefresh();
            const modal = document.getElementById('logsModal');
            document.getElementById('modalTitle').textContent = `${name} Logs`;
            document.getElementById('logsContent').textContent = 'Loading logs...';
            modal.style.display = 'block';

            fetch(`/api/service/logs`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({service: name})
            })
            .then(response => response.json())
            .then(data => document.getElementById('logsContent').textContent = data.logs || 'No logs available')
            .catch(error => document.getElementById('logsContent').textContent = 'Error loading logs: ' + error.message);
        }

        function closeLogs() {
            document.getElementById('logsModal').style.display = 'none';
            resumeAutoRefresh();
        }

        async function refreshStatus() {
            try {
                const response = await fetch(`/api/status?t=${Date.now()}`, {
                    cache: 'no-store',
                    headers: {'Cache-Control': 'no-cache'}
                });
                if (!response.ok) return;
                const statusData = await response.json();

                const serviceNameMap = {
                    'emby': 'Emby', 'copyparty': 'Copyparty', 'nzbhydra2': 'NZBHydra2',
                    'nzbget': 'NZBGet', 'maloja': 'Maloja', 'multi-scrobbler': 'Multi-Scrobbler',
                    'uptime-kuma': 'Uptime Kuma', 'tailscale': 'Tailscale', 'teamspeak': 'TeamSpeak'
                };

                Object.keys(statusData).forEach(serviceKey => {
                    const status = statusData[serviceKey] ? 'online' : 'offline';
                    const serviceName = serviceNameMap[serviceKey];
                    if (!serviceName) return;

                    const card = document.querySelector(`[data-service="${serviceName}"]`);
                    if (!card) return;

                    const badge = card.querySelector('.status-badge');
                    badge.className = `status-badge status-${status}`;
                    badge.textContent = status.toUpperCase();
                    badge.dataset.status = status;

                    const startBtn = card.querySelector('.btn-start');
                    const stopBtn = card.querySelector('.btn-stop');
                    startBtn.disabled = status === 'online';
                    stopBtn.disabled = status === 'offline';
                    card.querySelector('.btn-restart').disabled = false;
                });
            } catch (error) {}
        }

        function startAutoRefresh() { refreshTimer = setInterval(refreshStatus, 3000); }
        function pauseAutoRefresh() { if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; } }
        function resumeAutoRefresh() { if (!refreshTimer) startAutoRefresh(); }

        startAutoRefresh();
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLogs(); });
    </script>
</body>
</html>
