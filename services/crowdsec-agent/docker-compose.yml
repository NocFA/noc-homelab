services:
  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.7
    container_name: crowdsec-agent
    restart: unless-stopped
    environment:
      # Agent-only mode: disable local LAPI, forward alerts to noc-tux.
      # Real values live in .env (gitignored).
      DISABLE_LOCAL_API: "true"
      LOCAL_API_URL: ${LOCAL_API_URL}
      AGENT_USERNAME: ${AGENT_USERNAME}
      AGENT_PASSWORD: ${AGENT_PASSWORD}
      # Collections to install on first boot. Keep minimal on macs —
      # most http-cve scenarios are Linux-server oriented and would just
      # add noise. sshd covers the main risk surface.
      COLLECTIONS: "crowdsecurity/sshd crowdsecurity/base-http-scenarios"
      # Hostname shown in Discord alerts. Compose sets this from the
      # `HOSTNAME` env var in the per-mac .env so dashboards know which
      # machine flagged the event.
      CUSTOM_HOSTNAME: ${HOSTNAME}
    volumes:
      # macOS unified log surfaces sshd activity here — read-only mount.
      # Use /private/var/log explicitly; OrbStack/Docker Desktop don't
      # expose /var/log as a file source (it bind-mounts as an empty
      # directory), but /private/var/log is the real path on macOS.
      - /private/var/log/system.log:/var/log/system.log:ro
      # Agent acquisition rules: what to tail + how to label.
      - ./acquis.d:/etc/crowdsec/acquis.d:ro
      # Persist agent state (scenario registry, seen IPs) across restarts.
      - crowdsec-data:/var/lib/crowdsec/data
      - crowdsec-config:/etc/crowdsec
    # Pin noc-tux to its Tailscale IP inside the container. Host-side DNS
    # resolves it via Tailscale magic DNS, but different container
    # runtimes (OrbStack vs Colima) route LAN traffic differently — a
    # pinned Tailscale address works identically on both.
    extra_hosts:
      - "noc-tux:100.91.104.124"
    # Healthcheck via cscli; agent is healthy when it can reach LAPI.
    healthcheck:
      test: ["CMD", "cscli", "lapi", "status"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  crowdsec-data:
  crowdsec-config:
