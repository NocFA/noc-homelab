# CrowdSec acquisitions (extras).
#
# The CrowdSec debian package auto-generates `/etc/crowdsec/acquis.d/setup.*`
# on install, covering auth.log, syslog, kern.log, and journalctl for
# `caddy.service`. We only ADD what the auto-setup misses.
#
# Install location: /etc/crowdsec/acquis.yaml on noc-tux.
# Matches `setup.*` by-product is intentionally avoided to prevent dupes.

---
# Caddy *websites* journalctl — the auto-setup assumes unit name
# `caddy.service`, but our unit is `caddy-websites.service`.
source: journalctl
journalctl_filter:
 - "_SYSTEMD_UNIT=caddy-websites.service"
labels:
  type: caddy

---
# Matrix Traefik — JSON access log (HTTP probes, 401/403) for
# matrix.nocfa.net, the main direct-A WAN surface. Matrix containers
# have `--log-driver=none` hardcoded in the spantaleev playbook, so the
# docker source silently fails — see noc-homelab-5ej. Log file is
# written to disk via `traefik_config_accessLog_filePath` + a bind-mount
# configured in services/matrix/vars.sops.yml.
source: file
filenames:
 - /matrix/traefik/logs/access.log
labels:
  type: traefik

---
# Matrix Synapse — login abuse, registration scraping. Writes via
# RotatingFileHandler in the custom
# inventory/host_vars/matrix.nocfa.net/synapse.log.config.j2 template,
# bind-mounted to /matrix/synapse/logs/homeserver.log on host.
source: file
filenames:
 - /matrix/synapse/logs/homeserver.log
labels:
  type: syslog

---
# Forgejo runner (hit by misconfig / malicious workflow attempts)
source: journalctl
journalctl_filter:
 - "_SYSTEMD_UNIT=forgejo-runner.service"
labels:
  type: syslog
