# SOLE CrowdSec notifier → log-triage webhook on noc-claw.
#
# The triage service hydrates each batch with Loki context + an LLM-generated
# summary, groups alerts by source IP, and posts ONE combined Discord embed
# per IP that includes the rich attribution (flag, ASN, ban duration, paths)
# AND the LLM verdict — replaces the previous separate http_discord notifier.
#
# The notifier sends the array of alert objects as JSON (same as what cscli
# alerts inspect gives you). Headers include the auth token that matches the
# webhook's AUTH_TOKEN env.

type: http
name: http_triage
log_level: info

# Coalesce alerts into batches so a multi-scenario scan produces ONE Discord
# post per source IP instead of N. group_wait is the upper-bound delay from
# the first alert in a window to the flush; group_threshold caps batch size
# for pathological floods. The bouncer has already enforced bans by the time
# the batch flushes, so the up-to-60s notifier delay is purely cosmetic.
# log-triage groups the batch by source IP and emits one combined embed +
# one combined LLM verdict per IP.
group_wait: 60s
group_threshold: 50
max_retry: 3
timeout: 5s

# Pass the full CrowdSec Alert array. The service handles both single-object
# and array payloads. events[].meta is flattened from CrowdSec's native
# [{Key,Value}] list into a plain {key: value} dict so the Python side can
# access meta["http_path"] etc. directly.
format: |
  [{{range $i, $a := .}}{{if $i}},{{end}}{
    "scenario":     {{$a.Scenario | toJson}},
    "events_count": {{$a.EventsCount}},
    "source": {
      "ip":        {{$a.Source.IP | toJson}},
      "cn":        {{$a.Source.Cn | toJson}},
      "scope":     {{$a.Source.Scope | toJson}},
      "as_number": {{$a.Source.AsNumber | toJson}},
      "as_name":   {{$a.Source.AsName | toJson}}
    },
    "decisions": [{{range $j, $d := $a.Decisions}}{{if $j}},{{end}}{"type": {{$d.Type | toJson}}, "duration": {{$d.Duration | toJson}}}{{end}}],
    "events": [{{range $k, $e := $a.Events}}{{if $k}},{{end}}{
      "timestamp": {{$e.Timestamp | toJson}},
      "meta": { {{range $m, $kv := $e.Meta}}{{if $m}},{{end}}{{$kv.Key | toJson}}: {{$kv.Value | toJson}}{{end}} }
    }{{end}}],
    "start_at": {{$a.StartAt | toJson}},
    "stop_at":  {{$a.StopAt | toJson}}
  }{{end}}]

url: ${LOG_TRIAGE_URL}
method: POST
headers:
  Content-Type: application/json
  X-Auth-Token: ${LOG_TRIAGE_TOKEN}
