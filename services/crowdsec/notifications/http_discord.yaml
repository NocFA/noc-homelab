# Discord webhook notifier for CrowdSec.
#
# The real webhook URL lives in /etc/crowdsec/notifications/http_discord.yaml
# on the host (gitignored / SOPS-encrypted). This file in the repo has a
# placeholder. The deploy script substitutes ${CROWDSEC_DISCORD_WEBHOOK} from
# a .env file.
#
# Docs: https://docs.crowdsec.net/docs/notification_plugins/http/

type: http
name: http_discord
log_level: info

# Batch tuning. Without these, the plugin buffers indefinitely waiting for a
# burst that may never come. group_threshold=1 means every alert flushes
# immediately (no batching) which is what we want for a 3-machine homelab —
# alert volume is tiny so grouping saves nothing. group_wait is the upper bound
# from the first alert to the flush, kept short so bursty scenarios still flush
# promptly. max_retry + timeout are for the HTTP POST itself.
group_wait: 5s
group_threshold: 1
max_retry: 3
timeout: 5s

# One embed per alert, joined into a Discord payload.
#
# Surfaces:
#   - Title:       the scenario (e.g. crowdsecurity/http-cve-probing)
#   - Description: source IP + country + ASN + ban duration
#   - Fields:      enriched context (cve, method, target_uri, status) from
#                  Alert.Meta, plus per-event meta (target_fqdn, http_path)
#                  from the first event. Falls back gracefully if context
#                  isn't configured for the scenario.
#   - Footer:      indicates the bouncer is enforcing on INPUT + DOCKER-USER
#                  (4td: 2026-04-25 — was previously "observation only").
format: |
  {
    "username": "CrowdSec / noc-tux",
    "embeds":
      [{{range $i, $a := .}}{{if $i}},{{end}}{
        "title": "{{$a.Scenario}}",
        "description": "**`{{$a.Source.IP}}`**{{if $a.Source.Cn}} :flag_{{$a.Source.Cn | lower}}: {{$a.Source.Cn}}{{end}}{{if $a.Source.AsNumber}} · AS{{$a.Source.AsNumber}}{{if $a.Source.AsName}} *{{$a.Source.AsName}}*{{end}}{{end}}\n{{(index $a.Decisions 0).Type | upper}} for **{{(index $a.Decisions 0).Duration}}** · {{$a.EventsCount}} event(s)",
        "color": 15158332,
        "fields": [
          {{- /* Alert.Meta values are JSON-array-encoded strings (CrowdSec aggregates
                 context across events). Unwrap with mustFromJson | join. Without
                 this the inner unescaped quotes break JSON and Discord 400s. */ -}}
          {{- $first := true -}}
          {{- range $a.Meta -}}
            {{- if not $first}},{{end -}}
            {"name": "{{.Key}}", "value": "`{{.Value | mustFromJson | join ", "}}`", "inline": true}
            {{- $first = false -}}
          {{- end -}}
          {{- /* Events[0].Meta values are plain scalar strings, no unwrap needed. */ -}}
          {{- if gt (len $a.Events) 0 -}}
            {{- range (index $a.Events 0).Meta -}}
              {{- if or (eq .Key "target_fqdn") (eq .Key "http_path") (eq .Key "http_verb") (eq .Key "service") -}}
                {{- if not $first}},{{end -}}
                {"name": "{{.Key}}", "value": "`{{.Value}}`", "inline": true}
                {{- $first = false -}}
              {{- end -}}
            {{- end -}}
          {{- end -}}
        ],
        "footer": {"text": "noc-tux crowdsec · enforced via firewall-bouncer (INPUT + DOCKER-USER)"}
      }{{end}}]
  }

url: ${CROWDSEC_DISCORD_WEBHOOK}
method: POST
headers:
  Content-Type: application/json
