services:
  teamspeak6:
    image: teamspeaksystems/teamspeak6-server:latest
    container_name: teamspeak6-server
    restart: unless-stopped
    ports:
      - "9987:9987/udp"
      - "30033:30033/tcp"
      - "10011:10011/tcp"
      - "10022:10022/tcp"
      - "10080:10080/tcp"
      - "10443:10443/tcp"
    environment:
      - TSSERVER_LICENSE_ACCEPTED=accept
      - TSSERVER_QUERY_SSH_ENABLED=1
      - TSSERVER_QUERY_HTTP_ENABLED=1
      - TSSERVER_QUERY_HTTPS_ENABLED=1
      - TSSERVER_QUERY_ADMIN_PASSWORD=nl2EGdw7
    volumes:
      - ./data:/var/tsserver/
