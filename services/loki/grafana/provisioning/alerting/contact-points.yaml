apiVersion: 1

contactPoints:
  - orgId: 1
    name: discord
    receivers:
      - uid: discord-default
        type: discord
        settings:
          # URL is injected from environment at Grafana startup.
          # Set GRAFANA_DISCORD_WEBHOOK in services/loki/.env — empty string
          # disables the receiver silently (Grafana doesn't crash).
          url: $GRAFANA_DISCORD_WEBHOOK
          avatar_url: https://grafana.com/static/img/menu/grafana2.svg
          use_discord_username: true
          message: |
            **[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}**

            {{ range .Alerts }}
            Host: `{{ .Labels.instance }}` · {{ .Labels.severity }}
            {{ .Annotations.summary }}

            Value: `{{ .Annotations.value }}`
            Dashboard: {{ .Annotations.runbook_url }}
            {{ end }}

policies:
  - orgId: 1
    receiver: discord
    group_by:
      - alertname
      - instance
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
