# noc-claw pf anchor — block all non-Tailscale inbound
# Loaded via /etc/pf.anchors/noc-claw
#
# Strategy:
#   - Allow all traffic on loopback (lo0)
#   - Allow all traffic on Tailscale interface (utun4)
#   - Block all other inbound TCP/UDP on LAN/WAN interfaces
#   - Outbound is unrestricted

# Tailscale interface — allow everything
pass in on utun4 all

# Loopback — allow everything
pass in on lo0 all

# Block all other inbound on physical/virtual interfaces
block in on en0 all
block in on en1 all
block in on en2 all
block in on en3 all
block in on en4 all
block in on en5 all
block in on en6 all
block in on en7 all
