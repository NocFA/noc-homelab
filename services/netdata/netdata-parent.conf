# Netdata parent receiver config - noc-tux
# Installed to: /etc/netdata/netdata.conf
# Purpose: aggregate streaming children (noc-local, noc-claw) with ~100 GiB retention.
# Canonical UI: http://noc-tux:19999/  (node selector lists every child).
# Children stream via stream.conf API key (see stream-parent.conf.example).

[db]
    # Total retention across tiers ~= 98 GiB (of 1.5 TiB free on /)
    # Tier 0 (1s): ~30 days high-resolution
    dbengine tier 0 retention size = 16GiB
    dbengine tier 0 retention time = 30d

    # Tier 1 (60s): ~6 months mid-resolution
    dbengine tier 1 retention size = 32GiB
    dbengine tier 1 retention time = 6mo

    # Tier 2 (1h): ~5 years low-resolution
    dbengine tier 2 retention size = 50GiB
    dbengine tier 2 retention time = 5y

    # Page cache for perf with 3 streaming children
    dbengine page cache size = 256MiB
