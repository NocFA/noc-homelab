## Secrets are SOPS-encrypted. Decrypt before starting:
##   cd /home/noc/noc-homelab/services/stoat
##   export SOPS_AGE_KEY_FILE=/home/noc/noc-homelab/noc-homelab-beads/homelab.agekey
##   sops -d .env > .env.dec
##   sops -d Revolt.toml > Revolt.toml.dec
##   sops -d livekit.yaml > livekit.yaml.dec
##   docker compose --env-file .env.dec up -d

name: stoat

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  database:
    image: mongo:7
    container_name: stoat-database
    restart: unless-stopped
    volumes:
      - ./data/db:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: stoat-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  rabbit:
    image: rabbitmq:4
    container_name: stoat-rabbit
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: revolt
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD}
    volumes:
      - ./data/rabbit:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s

  minio:
    image: minio/minio
    container_name: stoat-minio
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DOMAIN: minio
    volumes:
      - ./data/minio:/data
    networks:
      default:
        aliases:
          - revolt-uploads.minio
    healthcheck:
      test: curl -f http://localhost:9000/minio/health/live
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  createbuckets:
    image: minio/mc
    container_name: stoat-createbuckets
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set minio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      /usr/bin/mc mb --ignore-existing minio/revolt-uploads;
      "

  # ---------------------------------------------------------------------------
  # Stoat Chat Backend
  # ---------------------------------------------------------------------------

  api:
    image: ghcr.io/stoatchat/api:v0.10.3
    container_name: stoat-api
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Revolt.toml.dec
        target: /Revolt.toml

  events:
    image: ghcr.io/stoatchat/events:v0.10.3
    container_name: stoat-events
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Revolt.toml.dec
        target: /Revolt.toml

  web:
    image: baptisterajaut/stoatchat-web:dev
    container_name: stoat-web
    restart: unless-stopped
    pull_policy: always
    environment:
      REVOLT_PUBLIC_URL: https://${STOAT_DOMAIN}/api
    volumes:
      - ./web-patch/index-D8ioLJwM.js:/usr/share/nginx/html/assets/index-D8ioLJwM.js:ro

  autumn:
    image: ghcr.io/stoatchat/file-server:v0.10.3
    container_name: stoat-autumn
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    volumes:
      - type: bind
        source: ./Revolt.toml.dec
        target: /Revolt.toml

  january:
    image: ghcr.io/stoatchat/proxy:v0.10.3
    container_name: stoat-january
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./Revolt.toml.dec
        target: /Revolt.toml

  gifbox:
    image: ghcr.io/stoatchat/gifbox:v0.10.3
    container_name: stoat-gifbox
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./Revolt.toml.dec
        target: /Revolt.toml

  crond:
    image: ghcr.io/stoatchat/crond:v0.10.3
    container_name: stoat-crond
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Revolt.toml.dec
        target: /Revolt.toml

  pushd:
    image: ghcr.io/stoatchat/pushd:v0.10.3
    container_name: stoat-pushd
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Revolt.toml.dec
        target: /Revolt.toml

  # ---------------------------------------------------------------------------
  # Voice
  # ---------------------------------------------------------------------------

  livekit:
    image: livekit/livekit-server:latest
    container_name: stoat-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    ports:
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml.dec:/etc/livekit.yaml:ro

  voice-ingress:
    image: ghcr.io/stoatchat/voice-ingress:v0.11.0
    container_name: stoat-voice-ingress
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Revolt.toml.dec
        target: /Revolt.toml

  # ---------------------------------------------------------------------------
  # Edge
  # ---------------------------------------------------------------------------

  caddy:
    image: caddy:2-alpine
    container_name: stoat-caddy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy-data:/data
      - ./data/caddy-config:/config
    depends_on:
      - api
      - events
      - web
      - autumn
      - january

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: stoat-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - caddy
