# NOC Homelab Agent Configuration
# Copy to config.yaml and customize for your machine

# Machine identification (used by dashboard)
machine:
  id: my-machine
  display_name: My Machine
  role: agent  # 'primary' or 'agent'

# Services managed by this agent
services:
  # Example: systemd system service
  emby:
    name: Emby
    manager: systemd
    service_name: emby-server
    scope: system  # system or user
    port: 8096
    description: Media streaming server

  # Example: systemd user service
  zurg:
    name: Zurg
    manager: systemd
    service_name: zurg
    scope: user
    port: 9999
    description: Real-Debrid WebDAV

  # Example: Docker container
  arcane:
    name: Arcane
    manager: docker
    container: arcane
    compose_dir: /home/noc/noc-homelab/services/arcane
    port: 3552
    description: Docker Management UI
