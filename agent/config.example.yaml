# NOC Homelab Agent Configuration
# Copy to config.yaml and customize for your machine

# Machine identification (used by dashboard)
machine:
  id: noc-winlocal
  display_name: Windows PC
  role: agent  # 'primary' or 'agent'

# Services managed by this agent
services:
  # Example: Windows Service
  plex:
    name: Plex Media Server
    manager: windows-service  # windows-service, nssm, docker
    service_name: PlexService
    port: 32400
    description: Media streaming server
    log_paths:
      - C:\Users\noc\AppData\Local\Plex Media Server\Logs\Plex Media Server.log

  # Example: Docker container
  jellyfin:
    name: Jellyfin
    manager: docker
    container: jellyfin
    compose_dir: C:\Users\noc\homelab\services\jellyfin
    port: 8096
    description: Media server
    log_paths: []

  # Example: NSSM-managed service
  sonarr:
    name: Sonarr
    manager: nssm
    service_name: Sonarr
    port: 8989
    description: TV show management
    log_paths:
      - C:\ProgramData\Sonarr\logs\sonarr.txt
