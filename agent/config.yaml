# NOC Homelab Agent Configuration (canonical, multi-host)
#
# Single source of truth for every host's service catalogue.  The agent
# reads this file at startup, looks up its own hostname under `hosts:`,
# and filters the `services:` list to entries whose `host:` matches.
#
# Schema version 2 (introduced 2026-05-02 by Wave 4 redesign).  The
# previous schema was per-host (each machine kept its own copy and
# git skip-worktree was used to stop them clobbering each other).
#
# To add a service: append an entry to `services:` with `host:` set to
# the machine it runs on.  No skip-worktree, no per-host overrides.

version: 2

# Hosts the agent recognises.  Keys must match `platform.node()` on the
# target machine (FQDN suffixes are stripped at runtime).  If a host is
# missing from this block the agent will refuse to start.
hosts:
  noc-local:
    display_name: noc-local
    role: dashboard
    platform: darwin
  noc-tux:
    display_name: noc-tux
    role: media
    platform: linux
  noc-claw:
    display_name: noc-claw
    role: agent
    platform: darwin

# All services across the homelab, every host in one list.
services:
  # ----- noc-tux -----------------------------------------------------
  - host: noc-tux
    id: emby
    name: Emby
    manager: systemd
    service_name: emby-server
    scope: system
    port: 8096
    description: Emby Media Server
    url: http://noc-tux:8096
  - host: noc-tux
    id: plex
    name: Plex
    manager: systemd
    service_name: plexmediaserver
    scope: system
    port: 32400
    description: Plex Media Server
    url: http://noc-tux:32400/web
  - host: noc-tux
    id: sunshine
    name: Sunshine
    manager: systemd
    service_name: sunshine
    scope: user
    port: 47990
    description: Sunshine Game Stream
    url: https://noc-tux:47990
  - host: noc-tux
    id: zurg
    name: Zurg
    manager: systemd
    service_name: zurg
    scope: user
    port: 9999
    description: Zurg WebDAV for Real-Debrid
    url: http://noc-tux:9999
  - host: noc-tux
    id: rclone-zurg
    name: Rclone Mount
    manager: systemd
    service_name: rclone-zurg
    scope: user
    description: Rclone FUSE mount for Zurg
  - host: noc-tux
    id: gatus
    name: Gatus
    manager: systemd
    service_name: gatus
    scope: user
    port: 3001
    description: Health monitoring
    url: http://noc-tux:3001
  - host: noc-tux
    id: homelab-agent
    name: Homelab Agent
    manager: systemd
    service_name: homelab-agent
    scope: user
    port: 8080
    description: Homelab Agent API
  - host: noc-tux
    id: plextraktsync
    name: PlexTraktSync
    manager: systemd
    service_name: plextraktsync
    scope: user
    description: Plex to Trakt.tv sync
  - host: noc-tux
    id: authentik
    name: Authentik
    manager: docker
    container: authentik-server
    description: Authentik SSO
    url: https://auth.nocfa.net
  - host: noc-tux
    id: arcane
    name: Arcane
    manager: docker
    container: arcane
    port: 3552
    description: Arcane Game Server
  - host: noc-tux
    id: matrix-synapse
    name: Matrix Synapse
    manager: docker
    container: matrix-synapse
    description: Matrix Synapse homeserver
  - host: noc-tux
    id: matrix-coturn
    name: Matrix Coturn
    manager: docker
    container: matrix-coturn
    description: Matrix TURN/STUN server
  - host: noc-tux
    id: matrix-client-element
    name: Element
    manager: docker
    container: matrix-client-element
    description: Element Matrix client

  # ----- noc-local ---------------------------------------------------
  - host: noc-local
    id: dashboard
    name: Dashboard
    launchd: com.noc.dashboard
    port: 8080
  - host: noc-local
    id: gatus
    name: Gatus
    port: 3001
  - host: noc-local
    id: glances
    name: Glances
    launchd: com.noc.glances
    port: 61999
  - host: noc-local
    id: copyparty
    name: Copyparty
    launchd: com.noc.copyparty
    port: 8081
  - host: noc-local
    id: maloja
    name: Maloja
    launchd: com.maloja.service
    port: 42010
  - host: noc-local
    id: multi-scrobbler
    name: Multi-Scrobbler
    launchd: com.multiscrobbler.service
    port: 9078
  - host: noc-local
    id: voiceseq
    name: VoiceSeq
    launchd: com.noc.voiceseq
    port: 61998
  - host: noc-local
    id: dmm
    name: Debrid Media Manager
    launchd: com.noc.dmm
    port: 3002

  # ----- noc-claw ----------------------------------------------------
  - host: noc-claw
    id: openclaw-gateway
    name: OpenClaw Gateway
    launchd: ai.openclaw.gateway
    port: 18789
    description: OpenClaw AI gateway (Pi + OpenAI)
    url: http://100.95.102.128:18789
  - host: noc-claw
    id: mdsf-mlx-server
    name: MDSF MLX Server
    launchd: com.noc.mdsf-mlx-server
    port: 8181
    description: Local LLM for MDSF crew (gemma-3-4b-it-4bit, localhost only)
  - host: noc-claw
    id: log-triage
    name: Log Triage
    launchd: com.noc.log-triage
    port: 8182
    description: "CrowdSec alert -> OpenAI LLM verdict -> Discord"
    url: http://100.95.102.128:8182
  - host: noc-claw
    id: claw-discord-bot
    name: Discord Bot
    launchd: com.noc.claw-discord-bot
    description: OpenClaw Discord relay (locked to user ID)
  - host: noc-claw
    id: glances
    name: Glances
    launchd: com.noc.glances
    port: 61999
    url: http://100.95.102.128:61999
  - host: noc-claw
    id: crowdsec-agent
    name: CrowdSec Agent
    launchd: com.noc.crowdsec-agent
    description: CrowdSec LAPI client (observation mode)
