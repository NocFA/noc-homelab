endpoints:
    # --- Core Infrastructure ---
    - name: "Dashboard"
      group: "Core"
      url: "http://noc-local:8080"
      interval: 30s
      conditions:
          - "[STATUS] == 200"
      alerts:
          - type: discord
            enabled: false
            send-on-resolved: true
            failure-threshold: 2

    - name: "Internet Connectivity"
      group: "Core"
      url: "https://1.1.1.1"
      interval: 3s
      conditions:
          - "[STATUS] == 200"
      alerts:
          - type: discord
            enabled: false
            send-on-resolved: true
            failure-threshold: 2

    - name: "Tailscale Mesh"
      group: "Core"
      url: "icmp://100.100.100.100"
      interval: 30s
      conditions:
          - "[CONNECTED] == true"
      alerts:
          - type: discord
            enabled: false
            send-on-resolved: true
            failure-threshold: 2

    # --- Media Services ---
    - name: "Copyparty"
      group: "Media"
      url: "http://noc-local:8081"
      interval: 30s
      conditions:
          - "[STATUS] == 200"
      alerts:
          - type: discord
            enabled: false
            send-on-resolved: true
            failure-threshold: 2

    - name: "Maloja"
      group: "Media"
      url: "http://noc-local:42010"
      interval: 30s
      conditions:
          - "[STATUS] == 200"
      alerts:
          - type: discord
            enabled: false
            send-on-resolved: true
            failure-threshold: 2

    - name: "Multi-Scrobbler"
      group: "Media"
      url: "http://noc-local:9078"
      interval: 30s
      conditions:
          - "[STATUS] == 200"
      alerts:
          - type: discord
            enabled: false
            send-on-resolved: true
            failure-threshold: 2

    # --- Voice Services ---
    - name: "TeamSpeak Server"
      group: "Voice"
      url: "tcp://noc-local:10011"
      interval: 10s
      conditions:
          - "[CONNECTED] == true"
      alerts:
          - type: discord
            enabled: false
            send-on-resolved: true
            failure-threshold: 2

    - name: "TS3AudioBot"
      group: "Voice"
      url: "http://noc-local:58913"
      interval: 30s
      conditions:
          - "[STATUS] == 200"
      alerts:
          - type: discord
            enabled: false
            send-on-resolved: true
            failure-threshold: 2

    # --- Cloud & Utilities ---
    - name: "Nextcloud"
      group: "Cloud"
      url: "http://noc-local:9080"
      interval: 30s
      conditions:
          - "[STATUS] == 200"
      alerts:
          - type: discord
            enabled: false
            send-on-resolved: true
            failure-threshold: 2

    - name: "Syncthing"
      group: "Utilities"
      url: "http://noc-local:8384"
      interval: 30s
      conditions:
          - "[STATUS] == 200"
      alerts:
          - type: discord
            enabled: false
            send-on-resolved: true
            failure-threshold: 2

    - name: "VoiceSeq"
      group: "Utilities"
      url: "http://noc-local:61998"
      interval: 30s
      conditions:
          - "[STATUS] == 200"
      alerts:
          - type: discord
            enabled: false
            send-on-resolved: true
            failure-threshold: 2

    # --- Cross-Check ---
    - name: "noc-winlocal Gatus"
      group: "Cross-Check"
      url: "http://noc-winlocal:3001"
      interval: 30s
      conditions:
          - "[STATUS] == 200"
      alerts:
          - type: discord
            enabled: false
            send-on-resolved: true
            failure-threshold: 2

alerting:
    discord:
        webhook-url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
        title: "🟡 NOCNET monitoring (noc-local)"
        message-content: <@YOUR_DISCORD_USER_ID>

ui:
    title: "NOC Homelab Status"
    header: "NOCNET - Status page"
